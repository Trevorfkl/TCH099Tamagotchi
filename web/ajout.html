<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter une activité</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

    <h1>Ajouter une activité 🌱</h1>

    <form id="formActivite">

        <div class="form-group">
            <label>Date</label>
            <input type="date" id="date" required>
        </div>

        <div class="form-group">
            <label>Type d'activité</label>
            <select id="type" required>
                <option value="">Choisir...</option>
                <option value="etude">🌱 Étude</option>
                <option value="tp">📘 TP / Devoir</option>
                <option value="examen">🌸 Examen</option>
            </select>
        </div>

        <div class="form-group">
            <label>Description</label>
            <input type="text" id="description" placeholder="Ex: Étudier math chap 3" required>
        </div>

        <div class="btn-container" style="margin-top: 30px;">
            <button type="submit" class="btn btn-primary">Ajouter</button>
            <a href="dashboard.html" class="btn btn-secondary">Retour</a>
        </div>

    </form>

</div>

<script>
document.getElementById("formActivite").addEventListener("submit", function(e) {
    e.preventDefault();

    const date = document.getElementById("date").value;
    const type = document.getElementById("type").value;
    const description = document.getElementById("description").value;

    const user = JSON.parse(localStorage.getItem("currentUser"));

    if (!user) {
        alert("Utilisateur non connecté");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    const index = users.findIndex(u => u.email === user.email);

    if (index === -1) return;

    if (!users[index].activites) {
        users[index].activites = [];
    }

    users[index].activites.push({
        date: date,
        type: type,
        description: description,
        completed: false
    });

    localStorage.setItem("users", JSON.stringify(users));

    alert("Activité ajoutée avec succès 🌱");

    window.location.href = "dashboard.html";
});
</script>

</body>
</html>
