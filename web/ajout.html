<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growchi - Ajouter une activité</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="garden-bg"></div>
    <div class="pixel-tree left"></div>
    <div class="pixel-tree right"></div>
    <div class="firefly" style="left:20%;top:65%;animation-duration:5s;"></div>
    <div class="firefly" style="left:75%;top:70%;animation-duration:4s;animation-delay:1s;"></div>

    <div class="page-wrapper">
        <div class="app-container dashboard-layout" style="max-width:600px;">

            <h1 style="margin-bottom:8px;">🌱 Ajouter une activité</h1>
            <p style="margin-bottom:24px; color:#5a8a6a; font-size:14px; font-weight:600;">
                Planifie une activité dans ton calendrier académique.
            </p>

            <div class="helper-box">
                🌱 Étude &nbsp;|&nbsp; 🪴 TP / Devoir &nbsp;|&nbsp; 🌸 Examen
                <div class="small-note">Chaque activité fait pousser une plante dans ton jardin !</div>
            </div>

            <div class="form-group">
                <label for="date_limite">📅 Date limite</label>
                <input type="date" id="date_limite" required>
            </div>

            <div class="form-group">
                <label for="titre">📝 Titre de l'activité</label>
                <input type="text" id="titre" placeholder="Ex : Étudier le chapitre 3 de TCH099" required>
            </div>

            <div class="form-group">
                <label for="type">🌿 Type d'activité</label>
                <select id="type" required>
                    <option value="">Choisir...</option>
                    <option value="etude">🌱 Étude</option>
                    <option value="tp">🪴 TP</option>
                    <option value="devoir">🪴 Devoir</option>
                    <option value="examen">🌸 Examen</option>
                </select>
            </div>

            <p id="errorMessage" class="error-msg" style="display:none;"></p>

            <div class="btn-container" style="margin-top:24px;">
                <button type="button" id="btnAjouter" class="btn btn-primary">🌱 Ajouter l'activité</button>
                <a href="dashboard.html" class="btn btn-secondary">← Retour</a>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const month = new Date().getMonth();
        const seasons = ['winter','winter','spring','spring','spring','summer','summer','summer','autumn','autumn','autumn','winter'];
        document.body.className = 'season-' + seasons[month];

        if (!requireAuth()) {}

        document.getElementById('date').value = new Date().toISOString().split('T')[0];

        document.getElementById('btnAjouter').addEventListener('click', async function () {
            const date        = document.getElementById('date').value;
            const type        = document.getElementById('type').value;
            const titre       = document.getElementById('titre').value.trim();
            const errorMsg    = document.getElementById('errorMessage');

            if (!date || !type || !description) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Tous les champs sont obligatoires.';
                return;
            }

            this.textContent = '🌱 Ajout en cours...';
            this.disabled = true;
            errorMsg.style.display = 'none';

            try {
                await apiCreerTache(titre, type, date_limite);
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = err.message;
                this.textContent = "🌱 Ajouter l'activité";
                this.disabled = false;
            }
        });
    </script>

</body>
</html>
