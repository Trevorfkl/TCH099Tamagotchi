<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growchi - Ajouter une activité</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container dashboard-layout">

        <h1 style="margin-top:0; margin-bottom:10px;">Ajouter une activité 🌱</h1>
        <p style="margin-top:0; margin-bottom:24px; color:#6B9F71;">
            Planifie une journée d'étude, un TP, un devoir ou un examen dans ton calendrier.
        </p>

        <div class="helper-box">
            Cette activité sera ajoutée à ton calendrier académique et représentée par une plante selon son type.
            <div class="small-note">🌱 Étude &nbsp;|&nbsp; 🪴 TP / Devoir &nbsp;|&nbsp; 🌸 Examen</div>
        </div>

        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" required>
        </div>

        <div class="form-group">
            <label for="type">Type d'activité</label>
            <select id="type" required>
                <option value="">Choisir...</option>
                <option value="etude">🌱 Étude</option>
                <option value="tp">🪴 TP</option>
                <option value="devoir">🪴 Devoir</option>
                <option value="examen">🌸 Examen</option>
            </select>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" placeholder="Ex : Étudier le chapitre 3 de TCH099" required>
        </div>

        <p id="errorMessage" style="display:none; color:red; font-size:14px; margin-top:5px;"></p>

        <div class="btn-container" style="margin-top:30px;">
            <button type="button" id="btnAjouter" class="btn btn-primary">Ajouter l'activité</button>
            <a href="dashboard.html" class="btn btn-secondary">Retour</a>
        </div>

    </div>

    <script src="app.js"></script>
    <script>
        if (!requireAuth()) {}

        document.getElementById('date').value = new Date().toISOString().split('T')[0];

        document.getElementById('btnAjouter').addEventListener('click', async function () {
            const date        = document.getElementById('date').value;
            const type        = document.getElementById('type').value;
            const description = document.getElementById('description').value.trim();
            const errorMsg    = document.getElementById('errorMessage');

            if (!date || !type || !description) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Tous les champs sont obligatoires.';
                return;
            }

            this.textContent = 'Ajout en cours...';
            this.disabled = true;
            errorMsg.style.display = 'none';

            try {
                await apiCreerTache(description, type, date);
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = err.message;
                this.textContent = "Ajouter l'activité";
                this.disabled = false;
            }
        });
    </script>

</body>
</html>
