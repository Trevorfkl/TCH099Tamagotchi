<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growchi - Modifier une activité</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container dashboard-layout">

        <h1 style="margin-top:0; margin-bottom:10px;">Modifier une activité ✏️</h1>
        <p style="margin-top:0; margin-bottom:24px; color:#6B9F71;">
            Mets à jour la date, le type ou la description de ton activité.
        </p>

        <div class="helper-box">
            Modifie les informations de ton activité académique dans le calendrier.
        </div>

        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" required>
        </div>

        <div class="form-group">
            <label for="type">Type d'activité</label>
            <select id="type" required>
                <option value="">Choisir...</option>
                <option value="etude">🌱 Étude</option>
                <option value="tp">🪴 TP</option>
                <option value="devoir">🪴 Devoir</option>
                <option value="examen">🌸 Examen</option>
            </select>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" placeholder="Ex : Étudier le chapitre 3 de TCH099" required>
        </div>

        <p id="errorMessage" style="display:none; color:red; font-size:14px; margin-top:5px;"></p>

        <div class="btn-container" style="margin-top:30px;">
            <button type="button" id="btnModifier" class="btn btn-primary">Enregistrer les modifications</button>
            <a href="dashboard.html" class="btn btn-secondary">Annuler</a>
        </div>

    </div>

    <script src="app.js"></script>
    <script>
        if (!requireAuth()) {}

        const editTaskId = sessionStorage.getItem('editTaskId');
        if (!editTaskId) window.location.href = 'dashboard.html';

        async function chargerTache() {
            try {
                const taches = await apiGetTaches();
                const tache  = taches.find(t => t.id == editTaskId);
                if (!tache) { window.location.href = 'dashboard.html'; return; }

                document.getElementById('date').value        = tache.date;
                document.getElementById('type').value        = tache.type;
                document.getElementById('description').value = tache.nom;
            } catch (err) {
                window.location.href = 'dashboard.html';
            }
        }

        document.getElementById('btnModifier').addEventListener('click', async function () {
            const date        = document.getElementById('date').value;
            const type        = document.getElementById('type').value;
            const description = document.getElementById('description').value.trim();
            const errorMsg    = document.getElementById('errorMessage');

            if (!date || !type || !description) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Tous les champs sont obligatoires.';
                return;
            }

            this.textContent = 'Enregistrement...';
            this.disabled = true;
            errorMsg.style.display = 'none';

            try {
                await apiModifierTache(editTaskId, description, type, date);
                sessionStorage.removeItem('editTaskId');
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = err.message;
                this.textContent = 'Enregistrer les modifications';
                this.disabled = false;
            }
        });

        chargerTache();
    </script>

</body>
</html>
