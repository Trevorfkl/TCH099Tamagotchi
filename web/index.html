<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growchi - Connexion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="logo-placeholder">🪴</div>

        <h1 style="text-align:center; margin-top:0; margin-bottom:10px;">Growchi</h1>
        <p style="text-align:center; margin-top:0; margin-bottom:30px; color:#6B9F71;">
            Connecte-toi pour accéder à ton jardin
        </p>

        <form action="mvc/frontController.php?action=seConnecter" method="POST">
            <div class="form-group">
                <label for="emailInput">Email</label>
                <input type="email" id="emailInput" name="email" placeholder="ton@email.com" required>
            </div>

            <div class="form-group">
                <label for="passwordInput">Mot de passe</label>
                <input type="password" id="passwordInput" name="mot_passe" placeholder="••••••••" required>
            </div>

            <div class="btn-container">
                <button type="submit" class="btn btn-primary">Se connecter</button>
                <a href="inscription.html" class="btn btn-secondary">S'inscrire</a>
            </div>
        </form>
    </div>

</body>
</html>
