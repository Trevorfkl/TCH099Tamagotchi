<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growchi - Connexion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="season-spring">

    <div class="garden-bg"></div>
    <div class="pixel-tree left"></div>
    <div class="pixel-tree right"></div>
    <div class="pixel-tree far-left"></div>
    <div class="pixel-tree far-right"></div>

    <!-- Fireflies -->
    <div class="firefly" style="left:15%;top:60%;animation-duration:4s;animation-delay:0s;"></div>
    <div class="firefly" style="left:75%;top:70%;animation-duration:6s;animation-delay:1s;"></div>
    <div class="firefly" style="left:45%;top:55%;animation-duration:5s;animation-delay:2s;"></div>
    <div class="firefly" style="left:85%;top:65%;animation-duration:7s;animation-delay:0.5s;"></div>

    <div class="page-wrapper">
        <div class="app-container" style="max-width:440px; margin-top:40px;">

            <div class="logo-placeholder">🪴</div>

            <h1 style="text-align:center; margin-bottom:8px;">Growchi</h1>
            <p style="text-align:center; margin-bottom:28px; color:#5a8a6a; font-size:14px; font-weight:600;">
                Connecte-toi à ton jardin académique 🌿
            </p>

            <div class="form-group">
                <label for="emailInput">📧 Email</label>
                <input type="email" id="emailInput" placeholder="ton@email.com" required>
            </div>

            <div class="form-group">
                <label for="passwordInput">🔒 Mot de passe</label>
                <input type="password" id="passwordInput" placeholder="••••••••" required>
            </div>

            <p id="errorMessage" class="error-msg" style="display:none;"></p>

            <div class="btn-container">
                <button type="button" id="btnConnexion" class="btn btn-primary">🌱 Se connecter</button>
                <a href="inscription.html" class="btn btn-secondary">✨ S'inscrire</a>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Saison selon le mois
        const month = new Date().getMonth();
        const seasons = ['winter','winter','spring','spring','spring','summer','summer','summer','autumn','autumn','autumn','winter'];
        document.body.className = 'season-' + seasons[month];

        if (getToken()) window.location.href = 'dashboard.html';

        document.getElementById('btnConnexion').addEventListener('click', async function () {
            const courriel   = document.getElementById('emailInput').value.trim();
            const motDePasse = document.getElementById('passwordInput').value.trim();
            const errorMsg   = document.getElementById('errorMessage');

            if (!courriel || !motDePasse) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Email et mot de passe requis.';
                return;
            }

            this.textContent = '🌱 Connexion...';
            this.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const data = await apiConnexion(courriel, motDePasse);
                setToken(data.token);
                setCurrentUser(data.utilisateur);
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = err.message;
                this.textContent = '🌱 Se connecter';
                this.disabled = false;
            }
        });
    </script>

</body>
</html>
