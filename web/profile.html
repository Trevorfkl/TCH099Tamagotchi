<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growchi - Profil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="garden-bg"></div>
    <div class="pixel-tree left"></div>
    <div class="pixel-tree right"></div>
    <div class="firefly" style="left:15%;top:65%;animation-duration:5s;"></div>
    <div class="firefly" style="left:85%;top:60%;animation-duration:4s;animation-delay:1s;"></div>

    <div class="page-wrapper">
        <div class="app-container dashboard-layout">

            <!-- Profile header -->
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">?</div>
                <div>
                    <div class="profile-name" id="profileFullName">Mon profil</div>
                    <div class="profile-subtitle" id="profileEmail">-</div>
                    <div class="profile-subtitle" id="profileBio" style="font-style:italic; opacity:0.8;"></div>
                </div>
            </div>

            <!-- Stats -->
            <div class="card-section">
                <h2 style="margin-bottom:14px;">📊 Mes statistiques</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="statCoins">0</div>
                        <div class="stat-label">💰 Coins gagnés</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="statTasks">0</div>
                        <div class="stat-label">📚 Activités totales</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="statCompleted">0</div>
                        <div class="stat-label">✅ Complétées</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="statProgress">0%</div>
                        <div class="stat-label">🌱 Progression</div>
                    </div>
                </div>
            </div>

            <!-- Account info -->
            <div class="card-section">
                <h2 style="margin-bottom:14px;">👤 Informations du compte</h2>
                <div class="info-line">🧑 <strong>Prénom :</strong> <span id="displayFirstName">-</span></div>
                <div class="info-line">📛 <strong>Nom :</strong> <span id="displayLastName">-</span></div>
                <div class="info-line">📧 <strong>Courriel :</strong> <span id="displayEmail">-</span></div>
            </div>

            <!-- Edit profile -->
            <div class="card-section">
                <h2 style="margin-bottom:16px;">🎨 Personnalisation</h2>

                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">Prénom</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Nom</label>
                        <input type="text" id="lastName" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="bio">📖 Biographie</label>
                    <textarea id="bio" placeholder="Ex : Étudiant motivé qui veut réussir sa session et faire grandir son jardin !"></textarea>
                </div>

                <div class="form-group">
                    <label>🎨 Couleur de profil</label>
                    <div class="color-options">
                        <div class="color-choice" data-color="#4a8a55" style="background:#4a8a55;"></div>
                        <div class="color-choice" data-color="#4F7CAC" style="background:#4F7CAC;"></div>
                        <div class="color-choice" data-color="#B07BAC" style="background:#B07BAC;"></div>
                        <div class="color-choice" data-color="#D98E73" style="background:#D98E73;"></div>
                    </div>
                </div>

                <p id="saveMessage" class="success-msg" style="display:none;">✅ Profil sauvegardé !</p>
                <p id="errorMessage" class="error-msg" style="display:none;"></p>

                <div class="btn-container" style="margin-top:24px;">
                    <button type="button" id="btnSave" class="btn btn-primary">💾 Enregistrer les modifications</button>
                    <a href="dashboard.html" class="btn btn-secondary">← Retour au jardin</a>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const month = new Date().getMonth();
        const seasons = ['winter','winter','spring','spring','spring','summer','summer','summer','autumn','autumn','autumn','winter'];
        document.body.className = 'season-' + seasons[month];

        if (!requireAuth()) {}

        let selectedColor = '#4a8a55';

        function updateColorSelection(color) {
            document.querySelectorAll('.color-choice').forEach(c => {
                c.classList.toggle('selected', c.dataset.color === color);
            });
        }

        document.querySelectorAll('.color-choice').forEach(c => {
            c.addEventListener('click', function () {
                selectedColor = this.dataset.color;
                updateColorSelection(selectedColor);
                document.getElementById('profileAvatar').style.background = selectedColor;
            });
        });

        async function loadProfile() {
            try {
                const [data, stats] = await Promise.all([apiGetProfil(), apiGetStats()]);

                document.getElementById('profileFullName').textContent  = data.prenom + ' ' + data.nom;
                document.getElementById('profileEmail').textContent     = data.courriel || '-';
                document.getElementById('profileBio').textContent       = data.biographie || '';
                document.getElementById('displayFirstName').textContent = data.prenom   || '-';
                document.getElementById('displayLastName').textContent  = data.nom      || '-';
                document.getElementById('displayEmail').textContent     = data.courriel || '-';

                document.getElementById('firstName').value = data.prenom      || '';
                document.getElementById('lastName').value  = data.nom         || '';
                document.getElementById('bio').value       = data.biographie  || '';

                document.getElementById('statCoins').textContent     = data.coins || 0;
                document.getElementById('statTasks').textContent     = stats.totalTaches || 0;
                document.getElementById('statCompleted').textContent = stats.tachesCompletees || 0;
                document.getElementById('statProgress').textContent  = (stats.pourcentageCompletion || 0) + '%';

                selectedColor = data.couleur_profil || '#4a8a55';
                const avatar = document.getElementById('profileAvatar');
                avatar.style.background = selectedColor;
                avatar.textContent = data.prenom ? data.prenom.charAt(0).toUpperCase() : '?';
                updateColorSelection(selectedColor);

                setCurrentUser({ ...getCurrentUser(), ...data });
            } catch (err) { console.error(err); }
        }

        document.getElementById('btnSave').addEventListener('click', async function () {
            const prenom   = document.getElementById('firstName').value.trim();
            const nom      = document.getElementById('lastName').value.trim();
            const bio      = document.getElementById('bio').value.trim();
            const errorMsg = document.getElementById('errorMessage');
            const saveMsg  = document.getElementById('saveMessage');

            if (!prenom || !nom) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Prénom et nom sont obligatoires.';
                return;
            }

            this.textContent = '⏳ Enregistrement...';
            this.disabled = true;
            errorMsg.style.display = 'none';

            try {
                await apiUpdateProfil(prenom, nom, bio);
                await apiUpdateCouleur(selectedColor);
                await loadProfile();
                saveMsg.style.display = 'block';
                setTimeout(() => saveMsg.style.display = 'none', 2500);
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = err.message;
            } finally {
                this.textContent = '💾 Enregistrer les modifications';
                this.disabled = false;
            }
        });

        loadProfile();
    </script>

</body>
</html>
