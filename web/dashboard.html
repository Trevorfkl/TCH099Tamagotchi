<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growchi - Mon Jardin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="garden-bg"></div>
    <div class="pixel-tree left"></div>
    <div class="pixel-tree right"></div>
    <div class="pixel-tree far-left"></div>
    <div class="pixel-tree far-right"></div>
    <div class="firefly" style="left:10%;top:60%;animation-duration:5s;"></div>
    <div class="firefly" style="left:90%;top:65%;animation-duration:4s;animation-delay:1s;"></div>
    <div class="firefly" style="left:50%;top:55%;animation-duration:6s;animation-delay:2s;"></div>

    <div class="page-wrapper">
        <div class="app-container dashboard-layout">

            <!-- Top bar -->
            <div class="top-bar">
                <div>
                    <div class="greeting" id="welcomeText">Bonjour ! 👋</div>
                    <div style="font-size:11px; color:rgba(255,255,255,0.7); margin-top:4px; font-weight:600;" id="seasonText">🌱 Printemps</div>
                </div>
                <div class="coins-badge" id="coinsBox">💰 0 coins</div>
            </div>

            <!-- Calendar -->
            <div class="calendar-wrapper">
                <div class="calendar-header">
                    <button class="cal-nav-btn" onclick="changeMonth(-1)">◀</button>
                    <div class="calendar-month" id="calendarTitle">Calendrier</div>
                    <button class="cal-nav-btn" onclick="changeMonth(1)">▶</button>
                </div>
                <div class="calendar-grid" id="calendarDaysHeader"></div>
                <div class="calendar-grid" id="calendarGrid"></div>
                <div class="legend-row">
                    <div class="legend-item">🌱 Étude</div>
                    <div class="legend-item">🪴 TP/Devoir</div>
                    <div class="legend-item">🌸 Examen</div>
                    <div class="legend-item">✅ Complété</div>
                </div>
            </div>

            <!-- Garden status -->
            <div class="garden-card">
                <div class="garden-status">
                    <div class="garden-icon" id="gardenIcon">🌱</div>
                    <div>
                        <div class="garden-name" id="gardenText">Jeune jardin</div>
                        <div class="garden-sub" id="progressText">0% de croissance</div>
                    </div>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar" style="width:0%;"></div>
                </div>
            </div>

            <!-- Tasks -->
            <div class="task-section">
                <div class="section-header">
                    <h2 style="font-size:15px;">🗓️ Activités du jour</h2>
                    <span id="selectedDateText" style="font-size:12px; color:#5a8a6a; font-weight:700;"></span>
                </div>
                <div id="taskList"></div>
                <p id="emptyMessage" class="empty-msg" style="display:none;">Aucune activité pour ce jour 🌿</p>
            </div>

            <!-- Buttons -->
             
            <div class="btn-container" style="margin-top:8px;">
                <a href="ajout.html" class="btn btn-primary">🌱 Ajouter une activité</a>
                <a href="leaderboard.html" class="btn btn-secondary">🏆 Classement</a>
                <a href="profile.html" class="btn btn-secondary">👤 Mon profil</a>
                <a href="shop.html" class="btn btn-secondary">🛒 Boutique</a>
    
            <div style="position:relative; display:inline-block;">
                <button type="button" class="btn btn-secondary" id="btnAdminMenu" onclick="toggleAdminMenu()" style="display:none; padding: 10px 15px;">⚙️</button>
        
            <div id="adminPopup" class="admin-popup" style="display:none;">
                <a href="admin_users.html">👥 Liste des utilisateurs</a>
                <a href="admin_shop.html">🛒++ Liste du shop</a>
            <button onclick="ajouterJetonsTest()">💰 Test: +100 Coins</button>
        </div>
    </div>

    <button type="button" class="btn btn-secondary" onclick="logout()" style="background:rgba(255,100,100,0.15); color:#c62828; border-color:rgba(255,100,100,0.3);">🚪 Déconnexion</button>
</div>

            

        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if (!requireAuth()) {}

        // Saison
        const month = new Date().getMonth();
        const seasons = ['winter','winter','spring','spring','spring','summer','summer','summer','autumn','autumn','autumn','winter'];
        const seasonNames = { spring:'🌸 Printemps', summer:'☀️ Été', autumn:'🍂 Automne', winter:'❄️ Hiver' };
        const currentSeason = seasons[month];
        document.body.className = 'season-' + currentSeason;

        let currentDate  = new Date();
        let selectedDate = new Date().toISOString().split('T')[0];
        let allTaches    = [];

        async function init() {
            try {
                document.getElementById('seasonText').textContent = seasonNames[currentSeason];

                // Charger profil frais depuis l'API pour avoir les vrais coins
                const [profil, taches] = await Promise.all([apiGetProfil(), apiGetTaches()]);

                document.getElementById('welcomeText').textContent = 'Bonjour, ' + profil.prenom + ' ! 👋';
                document.getElementById('coinsBox').textContent = '💰 ' + (profil.coins || 0) + ' coins';

                // Mettre à jour le localStorage avec les données fraîches
                const user = getCurrentUser();
                if (user) setCurrentUser({ ...user, ...profil });

                allTaches = taches;
                renderCalendar();
                renderTasks();
            } catch (err) { console.error(err); }
        }

        function formatDisplayDate(d) {
            return new Date(d + 'T00:00:00').toLocaleDateString('fr-CA', { year:'numeric', month:'long', day:'numeric' });
        }

        function getTachesForDate(d) { return allTaches.filter(t => t.date === d); }

        function getPlantForDay(taches) {
            if (!taches.length) return { emoji:'', label:'' };
            if (taches.every(t => t.completee)) return { emoji:'✅', label:'' };
            if (taches.some(t => t.type === 'examen')) return { emoji:'🌸', label:'' };
            if (taches.some(t => t.type === 'tp' || t.type === 'devoir')) return { emoji:'🪴', label:'' };
            return { emoji:'🌱', label:'' };
        }

        function renderCalendar() {
            const daysHeader = document.getElementById('calendarDaysHeader');
            const grid       = document.getElementById('calendarGrid');
            const title      = document.getElementById('calendarTitle');

            daysHeader.innerHTML = '';
            grid.innerHTML = '';

            ['L','M','M','J','V','S','D'].forEach(day => {
                const h = document.createElement('div');
                h.className = 'calendar-day-name';
                h.textContent = day;
                daysHeader.appendChild(h);
            });

            const year  = currentDate.getFullYear();
            const month = currentDate.getMonth();
            title.textContent = currentDate.toLocaleDateString('fr-CA', { month:'long', year:'numeric' }).toUpperCase();

            const firstDay = new Date(year, month, 1);
            const lastDay  = new Date(year, month + 1, 0);
            let offset = firstDay.getDay();
            offset = offset === 0 ? 6 : offset - 1;

            for (let i = 0; i < offset; i++) {
                const e = document.createElement('div');
                e.className = 'calendar-cell empty';
                grid.appendChild(e);
            }

            for (let day = 1; day <= lastDay.getDate(); day++) {
                const dateStr = new Date(year, month, day).toISOString().split('T')[0];
                const taches  = getTachesForDate(dateStr);
                const plant   = getPlantForDay(taches);
                const isToday = dateStr === new Date().toISOString().split('T')[0];

                const cell = document.createElement('div');
                cell.className = 'calendar-cell' + (dateStr === selectedDate ? ' selected' : '');
                if (isToday && dateStr !== selectedDate) cell.style.border = '3px solid #ff9800';
                cell.onclick = () => { selectedDate = dateStr; renderCalendar(); renderTasks(); };
                cell.innerHTML = `
                    <div class="calendar-day-number">${day}</div>
                    <div class="calendar-plant">${plant.emoji}</div>
                `;
                grid.appendChild(cell);
            }
        }

        function renderTasks() {
            const taches   = getTachesForDate(selectedDate);
            const listDiv  = document.getElementById('taskList');
            const emptyMsg = document.getElementById('emptyMessage');

            document.getElementById('selectedDateText').textContent = formatDisplayDate(selectedDate);
            listDiv.innerHTML = '';
            emptyMsg.style.display = taches.length === 0 ? 'block' : 'none';

            taches.forEach(task => {
                const checkSymbol = task.completee ? '✓' : '';
                const checkClass  = task.completee ? 'checkbox checked' : 'checkbox';
                const textClass   = task.completee ? 'task-text completed' : 'task-text';
                const typeEmoji   = { etude:'🌱', examen:'🌸', tp:'🪴', devoir:'🪴' }[task.type] || '📚';
                const typeLabel   = { etude:'Étude', examen:'Examen', tp:'TP', devoir:'Devoir' }[task.type] || 'Activité';

                const div = document.createElement('div');
                div.className = 'task-item';
                div.innerHTML = `
                    <div class="${checkClass}" onclick="toggleTask(${task.id}, ${task.completee})">${checkSymbol}</div>
                    <div style="flex:1;">
                        <div class="${textClass}">${typeEmoji} ${task.nom}</div>
                        <div class="task-date">${typeLabel} • ${task.date}</div>
                        <div class="task-actions">
                            <button onclick="goToEdit(${task.id})" class="action-btn action-btn-edit">✏️ Modifier</button>
                            <button onclick="deleteTache(${task.id})" class="action-btn action-btn-delete">🗑️ Supprimer</button>
                        </div>
                    </div>
                `;
                listDiv.appendChild(div);
            });

            updateGarden();
        }

        function updateGarden() {
            const total    = allTaches.length;
            const done     = allTaches.filter(t => t.completee).length;
            const progress = total > 0 ? Math.round((done / total) * 100) : 0;

            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressText').textContent = progress + '% de croissance';

            if (progress === 100 && total > 0) {
                document.getElementById('gardenIcon').textContent = '🌸';
                document.getElementById('gardenText').textContent = 'Jardin en fleurs';
            } else if (progress >= 50) {
                document.getElementById('gardenIcon').textContent = '🪴';
                document.getElementById('gardenText').textContent = 'Jardin en croissance';
            } else {
                document.getElementById('gardenIcon').textContent = '🌱';
                document.getElementById('gardenText').textContent = 'Jeune jardin';
            }
        }

        async function toggleTask(id, estCompletee) {
            try {
                const statutActuel = estCompletee ? 'completee' : 'en_attente';
                const result = await apiCompleterTache(id, statutActuel);
                allTaches = allTaches.map(t => t.id === id ? { ...t, completee: result.completee } : t);

                // Recharger le profil pour avoir les coins à jour
                try {
                    const profil = await apiGetProfil();
                    const user = getCurrentUser();
                    if (user) {
                        user.coins = profil.coins;
                        setCurrentUser(user);
                    }
                    document.getElementById('coinsBox').textContent = '💰 ' + profil.coins + ' coins';
                } catch (e) { /* ignore */ }

                renderCalendar();
                renderTasks();
            } catch (err) { alert('Erreur : ' + err.message); }
        }

        async function deleteTache(id) {
            if (!confirm('Supprimer cette activité ?')) return;
            try {
                await apiSupprimerTache(id);
                allTaches = allTaches.filter(t => t.id !== id);

                // Recharger les coins (la suppression d'une tâche complétée retire des coins)
                try {
                    const profil = await apiGetProfil();
                    const user = getCurrentUser();
                    if (user) { user.coins = profil.coins; setCurrentUser(user); }
                    document.getElementById('coinsBox').textContent = '💰 ' + profil.coins + ' coins';
                } catch (e) { /* ignore */ }

                renderCalendar();
                renderTasks();
            } catch (err) { alert('Erreur : ' + err.message); }
        }

        function goToEdit(id) {
            sessionStorage.setItem('editTaskId', id);
            window.location.href = 'modifier.html';
        }

        function changeMonth(step) {
            currentDate.setMonth(currentDate.getMonth() + step);
            renderCalendar();
        }
        // Affiche/Cache le menu popup
function toggleAdminMenu() {
    const popup = document.getElementById('adminPopup');
    popup.style.display = popup.style.display === 'none' ? 'flex' : 'none';
}

// Fonction pour le menu Test
async function ajouterJetonsTest() {
    try {
        const token = getToken();
        const reponse = await fetch('http://localhost:3000/api/profile/test-coins', {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (reponse.ok) {
            alert('⚙️ 100 jetons ajoutés avec succès !');
            window.location.reload(); // Recharge pour afficher les nouveaux jetons
        }
    } catch (e) {
        console.error('Erreur test coins:', e);
    }
}

// Vérifier si l'utilisateur est admin au chargement
document.addEventListener("DOMContentLoaded", () => {
    const user = getCurrentUser();
    if (user && user.role === 'admin') {
        document.getElementById('btnAdminMenu').style.display = 'inline-block';
    }
});
        init();
    </script>

</body>
</html>
