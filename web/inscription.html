<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plante Tamagotchi - Inscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <form action="#" method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" placeholder="Nom" required>
                </div>
                <div class="form-group">
                    <label>Prénom</label>
                    <input type="text" placeholder="Prénom" required>
                </div>
            </div>

            <div class="form-group">
                <label>Adresse Courriel</label>
                <input type="email" placeholder="ton@email.com" required>
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label>No de téléphone</label>
                <input type="tel" placeholder="123 456-7890">
            </div>

            <div class="btn-container" style="margin-top: 50px;">
                <button type="submit" class="btn btn-primary">Confirmer</button>
                <a href="index.html" class="btn btn-secondary">Retour</a>
            </div>
        </form>

    </div>

</body>
</html>
