<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growchi - Inscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">

        <h1 style="text-align:center; margin-top:0; margin-bottom:10px;">Créer un compte</h1>
        <p style="text-align:center; margin-top:0; margin-bottom:30px; color:#6B9F71;">
            Rejoins Growchi et commence ton jardin académique
        </p>

        <form action="mvc/frontController.php?action=seInscrire" method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label for="lastName">Nom</label>
                    <input type="text" id="lastName" name="lastName" placeholder="Nom" required>
                </div>
                <div class="form-group">
                    <label for="firstName">Prénom</label>
                    <input type="text" id="firstName" name="firstName" placeholder="Prénom" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Adresse Courriel</label>
                <input type="email" id="email" name="email" placeholder="ton@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="btn-container" style="margin-top: 50px;">
                <button type="submit" class="btn btn-primary">Confirmer</button>
                <a href="index.html" class="btn btn-secondary">Retour</a>
            </div>
        </form>

    </div>

</body>
</html>
