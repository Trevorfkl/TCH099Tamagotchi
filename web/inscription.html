<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growchi - Inscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="garden-bg"></div>
    <div class="pixel-tree left"></div>
    <div class="pixel-tree right"></div>
    <div class="firefly" style="left:20%;top:65%;animation-duration:5s;"></div>
    <div class="firefly" style="left:80%;top:70%;animation-duration:4s;animation-delay:1s;"></div>

    <div class="page-wrapper">
        <div class="app-container" style="max-width:500px; margin-top:30px;">

            <h1 style="margin-bottom:8px;">🌱 Créer un compte</h1>
            <p style="margin-bottom:28px; color:#5a8a6a; font-size:14px; font-weight:600;">
                Rejoins Growchi et commence ton jardin académique !
            </p>

            <div class="form-row">
                <div class="form-group">
                    <label for="lastName">👤 Nom</label>
                    <input type="text" id="lastName" placeholder="Nom" required>
                </div>
                <div class="form-group">
                    <label for="firstName">👤 Prénom</label>
                    <input type="text" id="firstName" placeholder="Prénom" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">📧 Courriel</label>
                <input type="email" id="email" placeholder="ton@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">🔒 Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <p id="errorMessage" class="error-msg" style="display:none;"></p>

            <div class="btn-container" style="margin-top:28px;">
                <button type="button" id="btnInscrire" class="btn btn-primary">🌸 Confirmer</button>
                <a href="index.html" class="btn btn-secondary">← Retour</a>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const month = new Date().getMonth();
        const seasons = ['winter','winter','spring','spring','spring','summer','summer','summer','autumn','autumn','autumn','winter'];
        document.body.className = 'season-' + seasons[month];

        document.getElementById('btnInscrire').addEventListener('click', async function () {
            const prenom     = document.getElementById('firstName').value.trim();
            const nom        = document.getElementById('lastName').value.trim();
            const courriel   = document.getElementById('email').value.trim();
            const motDePasse = document.getElementById('password').value.trim();
            const errorMsg   = document.getElementById('errorMessage');

            if (!prenom || !nom || !courriel || !motDePasse) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Tous les champs sont obligatoires.';
                return;
            }
            
            if (!courriel.includes('@')) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Veuillez entrer une adresse courriel valide (doit contenir un @).';
                return;
            }

            this.textContent = '🌱 Création...';
            this.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const data = await apiInscription(prenom, nom, courriel, motDePasse);
                setToken(data.token);
                setCurrentUser(data.utilisateur);
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = err.message;
                this.textContent = '🌸 Confirmer';
                this.disabled = false;
            }
        });
    </script>

</body>
</html>
